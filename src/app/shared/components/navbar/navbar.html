<header class="border-b border-slate-200 bg-white/90 backdrop-blur sticky top-0 z-40">
  <div class="mx-auto max-w-7xl px-4 py-3 sm:px-6 lg:px-8">
    <nav class="flex items-center justify-between" aria-label="Principal">
      <a routerLink="/" class="text-xl font-black tracking-tight text-slate-900">
        FakeStore
      </a>

      <div class="flex items-center gap-3">
        <span class="hidden text-sm font-semibold text-slate-600 sm:inline">
          Subtotal: {{ subtotal() | currency:'USD' }}
        </span>

        <button
          type="button"
          class="relative inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 text-slate-700 transition hover:bg-slate-100"
          [attr.aria-label]="'Carrito con ' + totalItems() + ' productos'"
        >
          <i class="pi pi-shopping-cart"></i>
          @if (totalItems() > 0) {
            <span class="absolute -right-1 -top-1 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-red-600 px-1 text-xs font-bold text-white">
              {{ totalItems() }}
            </span>
          }
        </button>
      </div>
    </nav>
  </div>
</header>
